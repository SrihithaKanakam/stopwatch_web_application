<!DOCTYPE html>
<html>
<head>
    <title>Stopwatch App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Stopwatch</h1>

        <div id="display">
            00:00:00
        </div>

        <div class="buttons">

            <button onclick="startStopwatch()">
                Start
            </button>

            <button onclick="pauseStopwatch()">
                Pause
            </button>

            <button onclick="resetStopwatch()">
                Reset
            </button>

            <button onclick="recordLap()">
                Lap
            </button>

        </div>

        <h3>Lap Times</h3>

        <ul id="laps"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
